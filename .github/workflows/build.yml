name: Build GHL DLL

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake (Win32)
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A Win32

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GHL-Release
          path: build/Release/GHL.dll
          if-no-files-found: error
```

**Tapi sebelum ini jalan, pastikan `CMakeLists.txt` ada di root repo** — sejajar langsung dengan `main.cpp`, `Engine.cpp`, dll. Bukan di dalam subfolder.

Struktur repo yang benar:
```
repo/
├── .github/
│   └── workflows/
│       └── build.yml
├── CMakeLists.txt        ← harus di sini
├── main.cpp
├── Engine.cpp
├── Misc.h
├── ValveSDK/
└── ...
